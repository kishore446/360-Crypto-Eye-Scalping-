version: "3.9"
services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python main.py

  webhook:
    build: .
    env_file: .env
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    command: gunicorn "bot.webhook:create_app()" --bind 0.0.0.0:5000 --workers 2
